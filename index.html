<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TBH Chest Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=12" />
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <img class="logo-icon" src="img/Item_930011.png" alt="TBH" width="26" height="26" />
        <span class="logo-text">TBH</span>
        <span class="logo-sep">·</span>
        <span class="logo-sub">Chest Tracker</span>
      </div>
      <div class="header-actions">
        <div class="lang-switch" id="langSwitch">
          <button class="lang-opt active" data-lang="en">EN</button>
          <button class="lang-opt" data-lang="es">ES</button>
          <button class="lang-opt" data-lang="pt">PT</button>
        </div>
        <button class="hdr-btn" id="editBtn" title="Edit route">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="hdr-btn" id="soundToggle" title="Toggle sound">
          <svg id="soundIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Summary pills -->
  <section class="summary" id="summary">
    <div class="pill pill-blue">
      <span class="pill-val" id="readyCount">0</span>
      <span class="pill-label" data-i18n="ready">Ready</span>
    </div>
    <div class="pill pill-gold">
      <span class="pill-val" id="cdCount">0</span>
      <span class="pill-label" data-i18n="onCd">On CD</span>
    </div>
    <div class="pill pill-grey">
      <span class="pill-val" id="greyCount">0</span>
      <span class="pill-label" data-i18n="grey">Collected</span>
    </div>
  </section>

  <!-- Add stage selector -->
  <section class="add-section" id="addSection">
    <div class="add-bar" id="addBar">
      <div class="select-wrap">
        <select id="actSelect" class="sel">
          <option value="1">Act 1</option>
          <option value="2">Act 2</option>
          <option value="3">Act 3</option>
        </select>
      </div>
      <div class="select-wrap">
        <select id="stageSelect" class="sel"></select>
      </div>
      <div class="select-wrap">
        <select id="diffSelect" class="sel">
          <option value="Normal">Normal</option>
          <option value="Nightmare">Nightmare</option>
          <option value="Hell">Hell</option>
          <option value="Torment">Torment</option>
        </select>
      </div>
      <button class="btn-add" id="addBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span data-i18n="add">Add</span>
      </button>
    </div>
  </section>

  <!-- How to use -->
  <section class="how-to">
    <button class="how-to-toggle" id="howToToggle">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      <span data-i18n="howTo">How to use</span>
    </button>
    <div class="how-to-content" id="howToContent">
      <ol id="howToSteps"></ol>
    </div>
  </section>

  <!-- Route cards -->
  <main class="route" id="route">
    <div class="empty-state" id="emptyState">
      <img src="img/Item_910011.png" alt="" width="40" height="40" style="image-rendering:pixelated;filter:grayscale(1) brightness(.4);opacity:.5" />
      <p data-i18n="emptyTitle">No stages in your route</p>
      <p class="empty-hint" data-i18n="emptyHint">Select an act, stage and difficulty above to start tracking</p>
    </div>
  </main>

  <!-- Actions -->
  <div class="footer-actions" id="footerActions" style="display:none">
    <button class="btn-secondary" id="resetBtn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      <span data-i18n="resetAll">Reset timers</span>
    </button>
    <button class="btn-secondary" id="defaultBtn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      <span data-i18n="loadDefault">Load default route</span>
    </button>
    <button class="btn-secondary btn-danger" id="clearBtn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      <span data-i18n="clearRoute">Clear route</span>
    </button>
  </div>

  <footer class="site-footer">
    <span>TBH Chest Tracker</span>
  </footer>

  <div class="toast-container" id="toasts"></div>

  <script src="app.js?v=12"></script>
</body>
</html>
